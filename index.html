<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Odin Recipes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f5f5f5;
      color: #333;
      transition: 0.3s;
    }

    /* 🌙 Dark Mode */
    body.dark {
      background: #121212;
      color: #eee;
    }

    /* HEADER */
    .hero {
      text-align: center;
      padding: 70px 20px;
      background: linear-gradient(135deg, #ff9966, #ff5e62);
      color: white;
    }

    .hero h1 {
      font-size: 3rem;
    }

    .hero p {
      margin-top: 10px;
      opacity: 0.9;
    }

    /* CONTROLS */
    .controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 20px;
      flex-wrap: wrap;
    }

    input {
      padding: 10px;
      width: 250px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #ff5e62;
      color: white;
      font-weight: 600;
    }

    /* SECTION */
    .section-title {
      text-align: center;
      margin: 30px 0;
      font-size: 1.5rem;
    }

    /* CARDS */
    .recipe-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      padding: 20px;
    }

    .card {
      width: 260px;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      text-decoration: none;
      color: black;
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
      transition: 0.3s;
    }

    body.dark .card {
      background: #1e1e1e;
      color: white;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      transition: 0.3s;
    }

    .card h2 {
      padding: 15px;
    }

    .card:hover {
      transform: translateY(-8px);
    }

    .card:hover img {
      transform: scale(1.1);
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 20px;
      background: #222;
      color: white;
      margin-top: 40px;
    }

    @media (max-width: 600px) {
      .hero h1 {
        font-size: 2rem;
      }
    }

  </style>
</head>

<body>

  <!-- HERO -->
  <header class="hero">
    <h1>🍽️ Odin Recipes</h1>
    <p>Discover simple and delicious recipes</p>
  </header>

  <!-- CONTROLS -->
  <div class="controls">
    <input type="text" id="search" placeholder="Search recipes...">
    <button onclick="toggleDark()">🌙 Toggle Mode</button>
  </div>

  <!-- RECIPES -->
 <div class="recipe-container" id="recipes">

  <a href="recipes/Fish_Curry.html" class="card">
    <img src="Recipes Images/Fish Curry.jpg" alt="Fish Curry">
    <h2>Fish Curry</h2>
  </a>

  <a href="recipes/lasagna.html" class="card">
    <img src="Recipes Images/lasagna.jpg" alt="Lasagna">
    <h2>Lasagna</h2>
  </a>

</div>
  <!-- FOOTER -->
  <footer>
    <p>© 2026 Sayondeep | Built with ❤️</p>
  </footer>

  <!-- JS -->
  <script>
    function toggleDark() {
      document.body.classList.toggle("dark");
    }

    const searchInput = document.getElementById("search");
    const cards = document.querySelectorAll(".card");

    searchInput.addEventListener("keyup", function () {
      const value = this.value.toLowerCase();

      cards.forEach(card => {
        const title = card.innerText.toLowerCase();
        card.style.display = title.includes(value) ? "block" : "none";
      });
    });
  </script>

</body>
</html>
