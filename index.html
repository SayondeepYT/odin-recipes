<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Odin Recipes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f5f5f5;
      color: #333;
      transition: 0.3s;
    }

    body.dark {
      background: #121212;
      color: #eee;
    }

    .hero {
      text-align: center;
      padding: 70px 20px;
      background: linear-gradient(135deg, #ff9966, #ff5e62);
      color: white;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 20px;
      flex-wrap: wrap;
    }

    input {
      padding: 10px;
      width: 250px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #ff5e62;
      color: white;
      font-weight: 600;
    }

    .recipe-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      padding: 20px;
    }

    .card {
      width: 260px;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      text-decoration: none;
      color: black;
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
      transition: 0.3s;
    }

    body.dark .card {
      background: #1e1e1e;
      color: white;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      transition: 0.3s;
    }

    .card h2 {
      padding: 15px;
    }

    .card:hover {
      transform: translateY(-8px);
    }

    .card:hover img {
      transform: scale(1.1);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #222;
      color: white;
      margin-top: 40px;
    }

  </style>
</head>

<body>

  <!-- HERO -->
  <header class="hero">
    <h1>🍽️ Odin Recipes</h1>
    <p>Dynamic Recipe App</p>
  </header>

  <!-- CONTROLS -->
  <div class="controls">
    <input type="text" id="search" placeholder="Search recipes...">
    <button onclick="toggleDark()">🌙 Mode</button>
  </div>

  <!-- RECIPES -->
  <div class="recipe-container" id="recipes"></div>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Sayondeep | Built with ❤️</p>
  </footer>

  <!-- JS -->
  <script>
    const recipes = [
      {
        name: "Fish Curry",
        image: "Recipes Images/Fish_Curry.jpg",
        link: "recipes/Fish_Curry.html"
      },
      {
        name: "Lasagna",
        image: "Recipes Images/Lasagna.jpg",
        link: "recipes/lasagna.html"
      }
    ];

    const container = document.getElementById("recipes");

    function displayRecipes(data) {
      container.innerHTML = "";

      data.forEach(recipe => {
        const card = document.createElement("a");
        card.href = recipe.link;
        card.className = "card";

        card.innerHTML = `
          <img src="${recipe.image}" alt="${recipe.name}">
          <h2>${recipe.name}</h2>
        `;

        container.appendChild(card);
      });
    }

    displayRecipes(recipes);

    // SEARCH
    document.getElementById("search").addEventListener("input", function () {
      const value = this.value.toLowerCase();

      const filtered = recipes.filter(r =>
        r.name.toLowerCase().includes(value)
      );

      displayRecipes(filtered);
    });

    // DARK MODE (SYNCED)
    function toggleDark() {
      document.body.classList.toggle("dark");
      localStorage.setItem("theme",
        document.body.classList.contains("dark") ? "dark" : "light"
      );
    }

    if (localStorage.getItem("theme") === "dark") {
      document.body.classList.add("dark");
    }

  </script>

</body>
</html>
